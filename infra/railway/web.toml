# Railway service config — Web dashboard
# In the Railway dashboard: add a new service → link same repo →
# set "Config File Path" to infra/railway/web.toml.
#
# Build args (set in Railway service variables):
#   NEXT_PUBLIC_API_URL  = https://<your-api-service>.railway.app
#   NEXT_PUBLIC_WS_URL   = wss://<your-api-service>.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/web/Dockerfile"
watchPatterns = [
  "packages/web/**",
  "packages/shared/**",
  "infra/docker/web/**",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
