<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How an agent is defined, tested, and tuned in Clawix</title>
  <desc>A flowchart showing five steps: Define the agent (name, role, system prompt), Wire model, skills, access (Provider, RBAC, memory scope), Register as spawnable (joins warm pool or roles), Test run (send a task, watch it work), then a decision diamond Behaves? — No leads to Adjust config (Role, model, tools) with tune and retest loop, Yes leads to Agent ready (Live or spawnable role).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Define the agent -->
  <rect x="200" y="24" width="280" height="60" rx="10" fill="#faeae7" stroke="#993c1d" stroke-width="0.75"/>
  <text x="340" y="48" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#712b13">Define the agent</text>
  <text x="340" y="66" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#993c1d">Name, role, system prompt</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="86" x2="340" y2="112" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Wire model -->
  <rect x="200" y="114" width="280" height="60" rx="10" fill="#faeae7" stroke="#993c1d" stroke-width="0.75"/>
  <text x="340" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#712b13">Wire model, skills, access</text>
  <text x="340" y="156" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#993c1d">Provider, RBAC, memory scope</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="176" x2="340" y2="202" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Register as spawnable -->
  <rect x="200" y="204" width="280" height="60" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
  <text x="340" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#3d3d3a">Register as spawnable</text>
  <text x="340" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">Joins warm pool or roles</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="266" x2="340" y2="292" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Test run -->
  <rect x="200" y="294" width="280" height="60" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
  <text x="340" y="318" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#3d3d3a">Test run</text>
  <text x="340" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">Send a task, watch it work</text>

  <!-- Arrow 4→diamond -->
  <line x1="340" y1="356" x2="340" y2="382" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond: Behaves? -->
  <polygon points="340,384 420,420 340,456 260,420" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
  <text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#14140f">Behaves?</text>

  <!-- No label + arrow right to Adjust config -->
  <text x="300" y="415" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#3d3d3a">No</text>
  <line x1="260" y1="420" x2="214" y2="420" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Adjust config box -->
  <rect x="30" y="392" width="180" height="60" rx="10" fill="#faeae7" stroke="#993c1d" stroke-width="0.75"/>
  <text x="120" y="416" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#712b13">Adjust config</text>
  <text x="120" y="434" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#993c1d">Role, model, tools</text>

  <!-- tune and retest loop arrow back up -->
  <text x="14" y="336" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#3d3d3a">tune and retest</text>
  <path d="M120 392 L120 324" stroke="#73726c" stroke-width="1.5" fill="none"/>
  <line x1="120" y1="324" x2="198" y2="324" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Yes label + arrow down to Agent ready -->
  <text x="350" y="470" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#3d3d3a">Yes</text>
  <line x1="340" y1="458" x2="340" y2="486" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent ready -->
  <rect x="200" y="488" width="280" height="60" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="340" y="512" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#085041">Agent ready</text>
  <text x="340" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0f6e56">Live or spawnable role</text>

  <!-- Legend -->
  <rect x="148" y="558" width="14" height="14" rx="3" fill="#faeae7" stroke="#993c1d" stroke-width="0.75"/>
  <text x="166" y="570" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#3d3d3a">You configure</text>

  <rect x="278" y="558" width="14" height="14" rx="3" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.75"/>
  <text x="296" y="570" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#3d3d3a">Runtime step</text>

  <rect x="398" y="558" width="14" height="14" rx="3" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="416" y="570" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#3d3d3a">Ready</text>
</svg>
