services:
  postgres:
    image: postgres:16-alpine
    container_name: clawix-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: clawix
      POSTGRES_PASSWORD: clawix_dev
      POSTGRES_DB: clawix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clawix']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clawix-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    image: node:22-slim
    container_name: clawix-api
    env_file: .env
    working_dir: /app
    ports:
      - '3001:3001'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./skills:/app/skills
      - ./infra/templates:/app/infra/templates:ro
      - ./packages/api/src:/app/packages/api/src
      - ./packages/api/prisma:/app/packages/api/prisma
      - ./packages/api/prisma.config.ts:/app/packages/api/prisma.config.ts
      - ./packages/api/package.json:/app/packages/api/package.json
      - ./packages/api/tsconfig.json:/app/packages/api/tsconfig.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/package.json:/app/packages/shared/package.json
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml.host:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - api_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/packages/api/node_modules
      - shared_pkg_node_modules:/app/packages/shared/node_modules
    environment:
      DATABASE_URL: postgresql://clawix:clawix_dev@postgres:5432/clawix?schema=public
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      HOST: '0.0.0.0'
      NODE_ENV: development
      LOG_LEVEL: debug
      JWT_SECRET: change-me-in-production
      BCRYPT_SALT_ROUNDS: '12'
      TEMPLATES_DIR: /app/infra/templates
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      WORKSPACE_BASE_PATH: /data
      WORKSPACE_HOST_BASE_PATH: ${CLAWIX_HOST_DATA_DIR:-${PWD}/data}
      SKILLS_BUILTIN_DIR: /app/skills/builtin
      SKILLS_BUILTIN_HOST_DIR: ${CLAWIX_HOST_SKILLS_DIR:-${PWD}/skills/builtin}
      SKILLS_CUSTOM_DIR: /app/skills/custom
      SKILLS_CUSTOM_HOST_DIR: ${CLAWIX_HOST_SKILLS_DIR:-${PWD}/skills/custom}
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends docker.io && rm -rf /var/lib/apt/lists/* &&
             cp /app/pnpm-lock.yaml.host /app/pnpm-lock.yaml &&
             corepack enable &&
             pnpm install --frozen-lockfile &&
             pnpm --filter @clawix/shared build &&
             pnpm --filter @clawix/api exec prisma generate &&
             chown -R $(stat -c '%u:%g' /app/packages/api/prisma/schema.prisma) /app/packages/api/src/generated &&
             pnpm --filter @clawix/api exec prisma migrate deploy --schema=prisma/schema.prisma &&
             (pnpm --filter @clawix/api exec node -e \"
               const { Client } = require('pg');
               const c = new Client({ connectionString: process.env.DATABASE_URL });
               c.connect()
                .then(() => c.query('SELECT count(*) FROM \\\"User\\\"'))
                .then(r => { c.end(); process.exit(Number(r.rows[0].count) > 0 ? 0 : 1); })
                .catch(() => { c.end(); process.exit(1); });
             \" || pnpm --filter @clawix/api exec prisma db seed) &&
             pnpm --filter @clawix/api exec nest start --watch"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-server:
    image: node:22-slim
    container_name: clawix-web
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/web/public:/app/packages/web/public
      - ./packages/web/package.json:/app/packages/web/package.json
      - ./packages/web/tsconfig.json:/app/packages/web/tsconfig.json
      - ./packages/web/next.config.ts:/app/packages/web/next.config.ts
      - ./packages/web/postcss.config.mjs:/app/packages/web/postcss.config.mjs
      - ./packages/web/components.json:/app/packages/web/components.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/package.json:/app/packages/shared/package.json
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml.host:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - web_node_modules:/app/node_modules
      - web_pkg_node_modules:/app/packages/web/node_modules
      - shared_web_pkg_node_modules:/app/packages/shared/node_modules
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    command: >
      sh -c "cp /app/pnpm-lock.yaml.host /app/pnpm-lock.yaml &&
             corepack enable &&
             pnpm install --frozen-lockfile &&
             pnpm --filter @clawix/shared build &&
             pnpm --filter @clawix/web dev"

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  api_pkg_node_modules:
  shared_pkg_node_modules:
  web_node_modules:
  web_pkg_node_modules:
  shared_web_pkg_node_modules:
