# Clawix Production Docker Compose
# Usage:
#   Build:  docker compose -f docker-compose.prod.yml build
#   Start:  docker compose -f docker-compose.prod.yml up -d
#   Logs:   docker compose -f docker-compose.prod.yml logs -f
#   Stop:   docker compose -f docker-compose.prod.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: clawix-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-clawix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-clawix}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clawix-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    image: clawix-api:latest
    container_name: clawix-api
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - '3003:3003'
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-clawix}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-clawix}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: '3003'
      HOST: '0.0.0.0'
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      PROVIDER_ENCRYPTION_KEY: ${PROVIDER_ENCRYPTION_KEY:?PROVIDER_ENCRYPTION_KEY is required (64 hex chars)}
      # Bootstrap (optional — consumed by dist/bootstrap.js on first start,
      # skipped silently if INITIAL_ADMIN_EMAIL is empty)
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o}
      TEMPLATES_DIR: /app/infra/templates
      WORKSPACE_BASE_PATH: /data
      WORKSPACE_HOST_BASE_PATH: ${CLAWIX_HOST_DATA_DIR:-${PWD}/data}
      SKILLS_BUILTIN_DIR: /app/skills/builtin
      SKILLS_BUILTIN_HOST_DIR: ${CLAWIX_HOST_SKILLS_BUILTIN_DIR:-${PWD}/skills/builtin}
      SKILLS_CUSTOM_DIR: /app/skills/custom
      SKILLS_CUSTOM_HOST_DIR: ${CLAWIX_HOST_SKILLS_CUSTOM_DIR:-${PWD}/skills/custom}
      # WhatsApp Baileys auth state — written under the persistent /data mount
      # so the QR pairing survives container restarts.
      WHATSAPP_AUTH_DIR: /data/whatsapp-auth
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./skills/builtin:/app/skills/builtin:ro
      - ./skills/custom:/app/skills/custom
      - ./infra/templates:/app/infra/templates:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    image: clawix-web:latest
    container_name: clawix-web
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
