# Railway service config — API
# This file configures the API service on Railway.
#
# Setup steps:
#   1. Create a Railway project and link this repo.
#   2. Add a Postgres plugin  → DATABASE_URL is injected automatically.
#   3. Add a Redis plugin     → REDIS_URL is injected automatically.
#   4. Add a second service for the Web (set dockerfilePath to infra/docker/web/Dockerfile).
#   5. Set the environment variables listed in infra/railway/env-reference.txt.
#   6. Provision a VPS and run infra/railway/vps-setup.sh — it outputs DOCKER_* vars to paste.
#
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/api/Dockerfile"
watchPatterns = [
  "packages/api/**",
  "packages/shared/**",
  "infra/docker/api/**",
  "prisma/**",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
